name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: client-typescript
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  sbom:
    name: SBOM generation (dry run)
    # Mirrors the release workflow's SBOM step on every PR so a future edit
    # cannot silently break CycloneDX generation between tag pushes.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Generate CycloneDX SBOM
        # @cyclonedx/cyclonedx-npm requires an npm lockfile. Synthesise one
        # from node_modules (populated by pnpm install) so the SBOM matches
        # what the release workflow produces.
        run: |
          set -euo pipefail
          mkdir -p artifacts
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          npx --yes @cyclonedx/cyclonedx-npm@latest \
            --output-format JSON \
            --output-file artifacts/sbom.cdx.json \
            --spec-version 1.5 \
            --package-lock-only
      - name: Validate SBOM is well-formed CycloneDX
        run: |
          set -euo pipefail
          cat > /tmp/validate-sbom.mjs <<'JS'
          import { readFileSync } from "node:fs";
          const doc = JSON.parse(readFileSync("artifacts/sbom.cdx.json", "utf8"));
          if (doc.bomFormat !== "CycloneDX") throw new Error("bomFormat != CycloneDX");
          if (!String(doc.specVersion || "").startsWith("1.")) throw new Error("missing specVersion");
          if (!Array.isArray(doc.components) || doc.components.length === 0) throw new Error("SBOM has no components");
          console.log(`SBOM OK: ${doc.components.length} components, spec ${doc.specVersion}`);
          JS
          node /tmp/validate-sbom.mjs

  release-workflow-lint:
    name: Release workflow supply-chain lint
    # Static check so a PR that drops cosign signing, npm provenance, or
    # CycloneDX generation from release.yml fails here instead of silently
    # on the next tag push.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify release.yml wires cosign + provenance + CycloneDX
        run: |
          set -euo pipefail
          wf=.github/workflows/release.yml
          grep -q 'sigstore/cosign-installer' "$wf" \
            || { echo "release.yml: missing cosign installer"; exit 1; }
          grep -q 'cosign sign-blob' "$wf" \
            || { echo "release.yml: missing cosign sign-blob step"; exit 1; }
          grep -q -- '--provenance' "$wf" \
            || { echo "release.yml: npm publish missing --provenance flag"; exit 1; }
          grep -q '@cyclonedx/cyclonedx-npm' "$wf" \
            || { echo "release.yml: missing CycloneDX SBOM generation"; exit 1; }
          grep -q 'softprops/action-gh-release' "$wf" \
            || { echo "release.yml: missing GitHub Release attachment"; exit 1; }
          grep -q 'cosign verify-blob' "$wf" \
            || { echo "release.yml: missing post-sign cosign verify-blob step"; exit 1; }
          echo "release.yml: all required supply-chain steps present"

  ci:
    name: ci
    if: always()
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, build, sbom, release-workflow-lint]
    steps:
      - name: Aggregate result
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi
          echo "All required checks passed"
