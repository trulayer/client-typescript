name: Release MCP

on:
  push:
    tags:
      - 'mcp-v*'

# Publishes @trulayer/mcp to npm with provenance attestation and creates
# a GitHub Release from the pushed mcp-v* tag.
permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish @trulayer/mcp to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @trulayer/mcp build
      - run: pnpm --filter @trulayer/mcp test
      - name: Publish @trulayer/mcp
        working-directory: packages/mcp
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
