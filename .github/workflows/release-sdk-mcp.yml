name: Release SDK and MCP

on:
  push:
    branches: [main]
  workflow_dispatch:

# Publishes @trulayer/sdk and @trulayer/mcp to npm on every merge to main.
# Version-change detection skips the publish job when neither package.json changed.
permissions:
  contents: write
  id-token: write

jobs:
  check-versions:
    name: Detect version changes
    runs-on: ubuntu-latest
    outputs:
      sdk_changed: ${{ steps.check.outputs.sdk_changed }}
      mcp_changed: ${{ steps.check.outputs.mcp_changed }}
      sdk_version: ${{ steps.check.outputs.sdk_version }}
      mcp_version: ${{ steps.check.outputs.mcp_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Detect version changes
        id: check
        run: |
          SDK_PREV=$(git show HEAD^:package.json 2>/dev/null | jq -r '.version' || echo "0.0.0")
          SDK_CURR=$(jq -r '.version' package.json)
          MCP_PREV=$(git show HEAD^:packages/mcp/package.json 2>/dev/null | jq -r '.version' || echo "0.0.0")
          MCP_CURR=$(jq -r '.version' packages/mcp/package.json)

          echo "sdk: $SDK_PREV -> $SDK_CURR"
          echo "mcp: $MCP_PREV -> $MCP_CURR"

          [ "$SDK_PREV" != "$SDK_CURR" ] && echo "sdk_changed=true" || echo "sdk_changed=false"
          [ "$MCP_PREV" != "$MCP_CURR" ] && echo "mcp_changed=true" || echo "mcp_changed=false"
          echo "sdk_version=$SDK_CURR"
          echo "mcp_version=$MCP_CURR"
        shell: bash
      - name: Write outputs
        id: write
        run: |
          SDK_PREV=$(git show HEAD^:package.json 2>/dev/null | jq -r '.version' || echo "0.0.0")
          SDK_CURR=$(jq -r '.version' package.json)
          MCP_PREV=$(git show HEAD^:packages/mcp/package.json 2>/dev/null | jq -r '.version' || echo "0.0.0")
          MCP_CURR=$(jq -r '.version' packages/mcp/package.json)
          [ "$SDK_PREV" != "$SDK_CURR" ] && echo "sdk_changed=true" >> "$GITHUB_OUTPUT" || echo "sdk_changed=false" >> "$GITHUB_OUTPUT"
          [ "$MCP_PREV" != "$MCP_CURR" ] && echo "mcp_changed=true" >> "$GITHUB_OUTPUT" || echo "mcp_changed=false" >> "$GITHUB_OUTPUT"
          echo "sdk_version=$SDK_CURR" >> "$GITHUB_OUTPUT"
          echo "mcp_version=$MCP_CURR" >> "$GITHUB_OUTPUT"

  publish-sdk:
    name: Publish @trulayer/sdk
    needs: check-versions
    if: needs.check-versions.outputs.sdk_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Set version output
        id: version
        run: echo "version=${{ needs.check-versions.outputs.sdk_version }}" >> "$GITHUB_OUTPUT"
      - name: Create artifacts directory
        run: mkdir -p artifacts
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: artifacts/trulayer-sdk-${{ steps.version.outputs.version }}-sbom.cdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Pack tarball
        run: |
          set -euo pipefail
          npm pack --json > pack.json
          tarball=$(node --input-type=module -e 'import { readFileSync } from "node:fs"; const j = JSON.parse(readFileSync("pack.json", "utf8")); process.stdout.write(j[0].filename);')
          mv "$tarball" "artifacts/$tarball"
      - name: Publish to npm with provenance
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}" || echo "tag already exists"
          git push origin "v${{ steps.version.outputs.version }}" || echo "tag already pushed"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdk-artifacts
          path: artifacts/

  publish-mcp:
    name: Publish @trulayer/mcp
    needs: check-versions
    if: needs.check-versions.outputs.mcp_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @trulayer/mcp build
      - run: pnpm --filter @trulayer/mcp test
      - name: Set version output
        id: version
        run: echo "version=${{ needs.check-versions.outputs.mcp_version }}" >> "$GITHUB_OUTPUT"
      - name: Publish @trulayer/mcp
        working-directory: packages/mcp
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "mcp-v${{ steps.version.outputs.version }}" || echo "tag already exists"
          git push origin "mcp-v${{ steps.version.outputs.version }}" || echo "tag already pushed"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    name: Create GitHub Release
    needs: [publish-sdk, publish-mcp]
    if: always() && (needs.publish-sdk.result == 'success' || needs.publish-mcp.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download SDK artifacts
        if: needs.publish-sdk.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: sdk-artifacts
          path: artifacts/
        continue-on-error: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.publish-sdk.outputs.version || needs.publish-mcp.outputs.version }}
          files: artifacts/**
          generate_release_notes: true
          fail_on_unmatched_files: false
