name: Release SDK, MCP, and Skills

on:
  workflow_dispatch:

# Publishes @trulayer/sdk, @trulayer/mcp, and @trulayer/skills to npm on demand.
# Versions are bumped automatically from the current npm registry
# state — no manual version change in package.json is required.
permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Bump versions, publish, and tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Compute next versions from npm registry
        id: versions
        run: |
          bump_patch() {
            local v="$1" major minor patch
            IFS='.' read -r major minor patch <<< "$v"
            echo "$major.$minor.$((patch + 1))"
          }

          SDK_PUBLISHED=$(npm view @trulayer/sdk version 2>/dev/null || echo "0.0.0")
          MCP_PUBLISHED=$(npm view @trulayer/mcp version 2>/dev/null || echo "0.0.0")
          SKILLS_PUBLISHED=$(npm view @trulayer/skills version 2>/dev/null || echo "0.0.0")

          SDK_NEXT=$(bump_patch "$SDK_PUBLISHED")
          MCP_NEXT=$(bump_patch "$MCP_PUBLISHED")
          SKILLS_NEXT=$(bump_patch "$SKILLS_PUBLISHED")

          echo "SDK: $SDK_PUBLISHED -> $SDK_NEXT"
          echo "MCP: $MCP_PUBLISHED -> $MCP_NEXT"
          echo "SKILLS: $SKILLS_PUBLISHED -> $SKILLS_NEXT"

          jq --arg v "$SDK_NEXT" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          jq --arg v "$MCP_NEXT" '.version = $v' packages/mcp/package.json > tmp.json && mv tmp.json packages/mcp/package.json
          jq --arg v "$SKILLS_NEXT" '.version = $v' packages/skills/package.json > tmp.json && mv tmp.json packages/skills/package.json

          echo "sdk_version=$SDK_NEXT" >> "$GITHUB_OUTPUT"
          echo "mcp_version=$MCP_NEXT" >> "$GITHUB_OUTPUT"
          echo "skills_version=$SKILLS_NEXT" >> "$GITHUB_OUTPUT"

      - name: Build SDK
        run: pnpm build

      - name: Build and test MCP
        run: |
          pnpm --filter @trulayer/mcp build
          pnpm --filter @trulayer/mcp test

      - name: Build and test Skills
        run: |
          pnpm --filter @trulayer/skills build
          pnpm --filter @trulayer/skills test

      - name: Generate CycloneDX SBOM for SDK
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: trulayer-sdk-${{ steps.versions.outputs.sdk_version }}-sbom.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Pack SDK tarball
        run: |
          set -euo pipefail
          npm pack --json > pack.json
          tarball=$(node --input-type=module -e \
            'import { readFileSync } from "node:fs"; const j = JSON.parse(readFileSync("pack.json","utf8")); process.stdout.write(j[0].filename);')
          echo "SDK_TARBALL=$tarball" >> "$GITHUB_ENV"

      - name: Publish @trulayer/sdk
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @trulayer/mcp
        working-directory: packages/mcp
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @trulayer/skills
        working-directory: packages/skills
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bumps and push tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json packages/mcp/package.json packages/skills/package.json
          git commit -m "chore: release sdk@${{ steps.versions.outputs.sdk_version }}, mcp@${{ steps.versions.outputs.mcp_version }}, skills@${{ steps.versions.outputs.skills_version }} [skip ci]"
          git tag "v${{ steps.versions.outputs.sdk_version }}"
          git tag "mcp-v${{ steps.versions.outputs.mcp_version }}"
          git tag "skills-v${{ steps.versions.outputs.skills_version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.versions.outputs.sdk_version }}" "mcp-v${{ steps.versions.outputs.mcp_version }}" "skills-v${{ steps.versions.outputs.skills_version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.versions.outputs.sdk_version }}
          files: |
            ${{ env.SDK_TARBALL }}
            trulayer-sdk-${{ steps.versions.outputs.sdk_version }}-sbom.cdx.json
          generate_release_notes: true
          body: |
            - `@trulayer/sdk` v${{ steps.versions.outputs.sdk_version }}
            - `@trulayer/mcp` v${{ steps.versions.outputs.mcp_version }}
            - `@trulayer/skills` v${{ steps.versions.outputs.skills_version }}
          fail_on_unmatched_files: false
